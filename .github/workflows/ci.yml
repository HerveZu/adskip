name: CI

on:
    push:
        tags: ['v*']
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        name: typecheck · lint · build
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Typecheck
              run: pnpm typecheck

            - name: Lint
              run: pnpm lint

            - name: Build
              run: pnpm build

            - name: Package dist
              id: pack
              run: |
                  if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
                      ZIP_NAME="adskip-${GITHUB_REF_NAME}.zip"
                  else
                      VERSION=$(node -p "require('./package.json').version")
                      SHORT_SHA=$(git rev-parse --short HEAD)
                      ZIP_NAME="adskip-${VERSION}-${SHORT_SHA}.zip"
                  fi
                  cd dist && zip -r "../${ZIP_NAME}" .
                  echo "zip=${ZIP_NAME}" >> "$GITHUB_OUTPUT"

            - name: Upload dist zip artifact
              uses: actions/upload-artifact@v4
              with:
                  name: adskip-dist
                  path: ${{ steps.pack.outputs.zip }}
                  if-no-files-found: error
                  retention-days: 30

            - name: Create GitHub Release
              if: startsWith(github.ref, 'refs/tags/')
              uses: softprops/action-gh-release@v2
              with:
                  files: ${{ steps.pack.outputs.zip }}
                  generate_release_notes: true
                  draft: false
                  prerelease: ${{ contains(github.ref_name, '-') }}
